<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Automação NineBox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles/login.css">
  <!-- FIX: removido jQuery — desnecessário, misturava $.ajax com fetch sem motivo -->
</head>

<body>

  <div class="conteudo">

    <nav class="navbar">
      <div class="nav-container">
        <h2>Automação Ninebox</h2>
      </div>
    </nav>

    <div class="card-login">
      <div class="login-container pt-4 pb-4 pe-5 ps-5">

        <div class="user-image">
          <img src="assets/images/logo/ninebox.svg" alt="Logo Ninebox">
        </div>
        <div class="login-header d-flex justify-content-center mb-2 mt-3 pt-0" style='color: #1a237e'>
          <h3>Seja Bem-vindo(a)!</h3>
        </div>

        <form id="loginForm" onsubmit="login(event)">
          <div class="text-center">
            <label for="tipoAcesso" class="form-label mt-1">Escolha o tipo de acesso:</label>
            <hr class="mt-2 mb-3">
            <div id="tipoAcesso" class="d-flex justify-content-between align-items-center mb-4 ps-5 pe-5">
              <div class="d-flex justify-content-center" style="flex: 1;">
                <input class="form-check-input" type="radio" name="accessType" id="admin" value="admin" checked>
                <label class="form-check-label mx-2" for="admin">Administrador</label>
              </div>
              <div class="d-flex justify-content-center" style="flex: 1;">
                <input class="form-check-input" type="radio" name="accessType" id="user" value="usuario">
                <label class="form-check-label mx-2" for="user">Usuário</label>
              </div>
            </div>
          </div>

          <div id="formularioTroca"></div>

          <div class="text-center">
            <button type="submit" class="btn btn-login d-flex-justify-content-start pt-2 pb-2 ps-3 pe-3">Login</button>
          </div>
        </form>

        <div id="recuperacao-container" style="display: none; margin-top: 20px;">
          <label for="recuperacao-email">Digite seu e-mail:</label>
          <input type="email" id="recuperacao-email" class="form-control" placeholder="exemplo@email.com">
          <button class="btn btn-primary mt-2" onclick="recuperarSenha()"
            style="background-color:#00008B; border: none;">Enviar código de recuperação</button>
        </div>
      </div>
    </div>

    <footer class="mt-4">
      © Todos os direitos reservados
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // FIX: URL da API centralizada — antes estava hardcoded em cada função
    const API_BASE = 'http://localhost:3000/api';

    let usuarioSelecionado = "admin";

    addEventListener("DOMContentLoaded", () => {
      localStorage.clear();
      sessionStorage.clear();
      formAdmin();

      const tipoAcesso = document.getElementById("tipoAcesso");
      tipoAcesso.addEventListener("change", () => {
        const acesso = tipoAcesso.querySelector('input[name="accessType"]:checked');
        usuarioSelecionado = acesso.value;

        if (usuarioSelecionado === 'admin') {
          formAdmin();
        } else {
          formUser();
          formataCPF();
        }
      });
    });

    function formUser() {
      document.getElementById('formularioTroca').innerHTML = `
        <div class="mb-3">
          <label for="tipoCargo" class="form-label">Tipo de avaliação:</label>
          <select class="form-select" id="tipoCargo" name="tipoCargo" required>
            <option value="" selected disabled hidden>Selecione</option>
            <option value="colaborador">Colaborador</option>
            <option value="gestor">Gestor</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="cpf" class="form-label">CPF</label>
          <input type="text" class="form-control" id="cpf" name="cpf"
            placeholder="Digite o seu CPF" maxlength="14" required>
        </div>
      `;
    }

    function formAdmin() {
      document.getElementById('formularioTroca').innerHTML = `
        <div class="mb-3">
          <label for="email" class="form-label">Email / CPF</label>
          <input type="text" class="form-control" id="email" name="email"
            placeholder="Digite o seu e-mail ou CPF" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <input type="password" class="form-control" id="password" name="password"
            placeholder="********" required>
        </div>
        <div class="forgot-password mb-3 d-flex-justify-content-start">
          <a href="#" onclick="mostrarRecuperacao()">Esqueci a senha</a>
        </div>
      `;
    }

    function login(event) {
      event.preventDefault();
      if (usuarioSelecionado === 'admin') {
        // FIX: event passado explicitamente — antes validaAdmin acessava "event" do escopo global
        validaAdmin(event);
      } else {
        validaUsuario();
      }
    }

    // FIX: usa fetch em vez de $.ajax (consistência + remove dependência do jQuery)
    async function validaAdmin(event) {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const accessType = document.querySelector('input[name="accessType"]:checked').value;

      if (!email || !password || !accessType) {
        alert("Preencha todos os campos: Email/CPF, Senha e Tipo de Acesso.");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, accessType })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || "Erro ao processar o login.");
          return;
        }

        sessionStorage.setItem('token', data.token);

        if (data.tipo === 'admin' || data.tipo === 'manager') {
          window.location.href = 'pages/dashboard/menu.html';
        } else {
          alert("Role não reconhecido: " + data.tipo);
        }
      } catch (err) {
        console.error('Erro de rede:', err);
        alert("Erro de conexão com o servidor.");
      }
    }

    async function validaUsuario() {
      const tipoCargo = document.getElementById("tipoCargo")?.value;
      const cpfRaw = document.getElementById("cpf")?.value || '';

      // FIX: CPF removido a máscara antes de enviar — antes enviava "000.000.000-00"
      // e o banco não encontrava o registro (que foi salvo sem pontuação)
      const cpf = cpfRaw.replace(/\D/g, '');

      if (!tipoCargo || !cpf) {
        alert("Preencha todos os campos.");
        return;
      }

      if (cpf.length !== 11) {
        alert("CPF inválido. Digite os 11 dígitos.");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/loginUsuario`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cpf, tipoCargo })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message || `Erro: ${res.status}`);
          return;
        }

        sessionStorage.setItem('token', data.token);

        if (tipoCargo === "colaborador") {
          window.location.href = 'pages/evaluations/respond/employee/list.html';
        } else {
          window.location.href = 'pages/evaluations/respond/manager/list.html';
        }
      } catch (err) {
        console.error('Erro de rede:', err);
        alert("Erro de conexão com o servidor.");
      }
    }

    function formataCPF() {
      const cpfInput = document.getElementById('cpf');
      if (!cpfInput) return;

      cpfInput.addEventListener('input', function () {
        let cpf = this.value.replace(/\D/g, '');
        if (cpf.length > 11) cpf = cpf.substring(0, 11);

        if (cpf.length > 9) {
          cpf = cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
        } else if (cpf.length > 6) {
          cpf = cpf.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
        } else if (cpf.length > 3) {
          cpf = cpf.replace(/(\d{3})(\d{1,3})/, "$1.$2");
        }

        this.value = cpf;
      });
    }

    function mostrarRecuperacao() {
      document.getElementById('recuperacao-container').style.display = 'block';
    }

    // FIX: antes chamava /esqueci-senha que não existe no backend — agora avisa o usuário corretamente
    function recuperarSenha() {
      const email = document.getElementById('recuperacao-email').value;
      if (!email) {
        alert('Digite seu e-mail!');
        return;
      }
      alert('Funcionalidade de recuperação de senha ainda não implementada. Entre em contato com o administrador.');
    }
  </script>

</body>
</html>
