<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliação de Competências</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../../../assets/styles/navbar.css">
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background-color: #f4f7fc;
    }

    .container {

      border-radius: 20px;
      padding: 30px;
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: stretch;
      justify-items: center;
    }

    .container_avaliacao {
      border: 1px solid #ccc;
      background-color: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 1rem;
    }

    #txt_colored {
      color: rgb(3, 92, 194);
      font-size: 1.3rem;
    }



    .container-btn {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    .btn-voltar {
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      background-color: white;
      border-color: #1a237e;
      color: #1a237e;
    }

    .btn-voltar:hover {
      background-color: #1a237e;
      color: white;
    }

    .btn-proximo {
      background-color: #1a237e;
      color: white;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
    }

    .btn-secondary {
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      border-color: #1a237e;
      color: #1a237e;
      background-color: white;
    }

    .btn-secondary:hover {
      background-color: #1a237e;
      color: white;
    }

    .btn-primary {
      background-color: #1a237e;
      color: white;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
    }

    .page-number {
      margin: 0 5px;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .page-number.active {
      font-weight: bold;
      color: #007bff;
    }

    .accordion-button {
      background-color: white;

      color: black;
    }

    .accordion-button:not(.collapsed)::after {
      filter: invert(1);
    }

    .accordion-button:not(.collapsed) {
      background-color: #1a237e;
      font-weight: 700;
      color: white;
    }


    .competencia-titulo {
      color: #1a237e;
      text-align: center;
      margin-bottom: 1rem;
    }

    th.tituloTabela1 {
      width: 45%;
      background-color: #1a237e;
      color: white;
      font-family: inherit;

    }

    th.tituloTabela2 {
      width: 27, 5%;
      background-color: #1a237e;
      color: white;


    }

    th.tituloTabela3 {
      width: 27, 5%;
      background-color: #1a237e;
      color: white;
      font-family: inherit;

    }

    .table td,
    .table th {
      text-align: center;
    }

    .table-primary th {
      font-weight: normal;
      color: white;
      background-color: #00008B;
    }
  </style>
</head>

<body>

  <!--Container que mostra a competencia selecionada-->
  <div class="container">
    <p id="txt_colored" class="text-center mb-4"></p>
    <div id="competencias-container" class="content-box">
      <!--Aqui fica o título da competencia, gerado pelo javascript renderCompetencias()-->
    </div>

    <!--Tabela com a lista de avaliados-->

    <table class="table table-striped table-bordered mt-3">
      <thead>
        <tr>
          <th class="tituloTabela1">Colaborador</th>
          <th class="tituloTabela2">Ideal</th>
          <th class="tituloTabela3">Bom</th>
          <th class="tituloTabela3">Mediano</th>
          <th class="tituloTabela3">A melhorar</th>
        </tr>
      </thead>
      <tbody id="avaliados-tabela">
        <!-- Tabela de avaliados será gerada dinamicamente -->
      </tbody>
    </table>


    <div class="container-btn align-items-center">
      <a href="../responderAvaliacaoGestor/avaliacao_orientacoes_gestor.html" class="btn btn-voltar" id="btn-voltar">Voltar</a>
      <div class="pagination-container" id="pagination-container"></div>
      <button class="btn btn-proximo" id="btn-proximo">Próximo</button>
    </div>

  </div>

  <!-- Modal de Finalização -->
  <div class="modal" tabindex="-1" id="finalizarModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Finalizar Avaliação</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

        </div>
        <div class="modal-body">
          <p>Você está prestes a finalizar sua avaliação. Deseja continuar?</p>
        </div>
        <div class="modal-footer d-flex justify-content-between">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="confirmar-finalizar">Sim, Finalizar</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Script do navbar -->
  <script src="../../../scripts/navbar.js"></script>
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
  <script>
    window.nomePagina = "Avaliação de competências";

    document.addEventListener('DOMContentLoaded', function () {
      initPage()
    });

    async function initPage() {
      const token = sessionStorage.getItem('token');
      const idAvaliacao = localStorage.getItem('idAvaliacao');

      if (!token) {
        alert('Sessão expirada ou não autenticada. Faça login novamente.');
        window.location.href = 'index.html';
        return;
      }
      if (!idAvaliacao) {
        alert('Erro, Avaliação não encontrada.');
        window.location.href = 'index.html';
        return;
      }

      await loadAvaliados(idAvaliacao, token);
      await loadCompetencias(idAvaliacao);
    }

    // ================== VARIÁVEIS GLOBAIS ==================
    let competencias = [];
    let avaliados = [];
    const localStorageKey = 'respostas_avaliacao';
    let respostas = JSON.parse(localStorage.getItem(localStorageKey)) || {};
    const itemsPerPage = 1;
    let currentPage = 0;


    // Carrega os avaliados
    async function loadAvaliados(idAvaliacao, token) {
      try {
        const response = await fetch('http://localhost:3000/api/avaliadosPoridAvaliacaoGestor', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ idAvaliacao }) // se a API precisar do id no body
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Erro ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        if (data.avaliados && Array.isArray(data.avaliados)) {
          avaliados = data.avaliados;

          renderAvaliados(); // chama o render da tabela
        } else {
          console.error('Avaliados não encontrados ou inválidos.');
        }
      } catch (error) {
        console.error('Erro ao carregar avaliados:', error);
      }
    }

    // Carrega as competencias
    async function loadCompetencias(idAvaliacao) {
      try {
        const response = await fetch('http://localhost:3000/api/competenciaPoridAvaliacaoGestor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idAvaliacao })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Erro ${response.status}: ${errorText}`);
        }

        //Se der certo, ele chama a função renderCompetencias
        const data = await response.json();
        if (data.competencias && Array.isArray(data.competencias)) {
          competencias = data.competencias;
          renderCompetencias();
        } else {
          console.error('Competências não encontradas ou inválidas.');
        }
      } catch (error) {
        console.error('Erro ao carregar competências:', error);
      }
    }

    //O render competencias de gestor cria as competencias em um accordion bootstrap----------------------------------------------------------

    function renderCompetencias() {
      const container = document.getElementById('competencias-container');
      container.innerHTML = '';

      const startIndex = currentPage * itemsPerPage;
      const endIndex = Math.min(startIndex + itemsPerPage, competencias.length);
      const currentCompetencias = competencias.slice(startIndex, endIndex);

      currentCompetencias.forEach((competencia, compIndex) => {
        const idCompetencia = competencia.id;
        const respostas = JSON.parse(localStorage.getItem('respostas_avaliacao')) || {};
        const observacao = respostas[idCompetencia]?.observacao || "";


        const categorias = [
          { titulo: "Ideal", conteudo: competencia.ideal },
          { titulo: "Bom", conteudo: competencia.bom },
          { titulo: "Mediano", conteudo: competencia.mediano },
          { titulo: "A melhorar", conteudo: competencia.a_melhorar }
        ];

        // Criar o accordion para cada competência
        const accordionId = `accordion_${idCompetencia}`;
        const div = document.createElement('div');
        div.className = 'mb-4';

        div.innerHTML = `
      <h3 class="text-center mb-3" style="color:#7A51cc; font-weight:700;">
        ${competencia.nome}
      </h3>
      <p class="text-center"><strong>${competencia.descricao}</strong></p>

      <div class="accordion" id="${accordionId}">
        ${categorias.map((cat, index) => `
          <div class="accordion-item">
            <h2 class="accordion-header" id="heading_${idCompetencia}_${index}">
              <button class="accordion-button ${index !== 0 ? 'collapsed' : ''}" 
                      type="button" 
                      data-bs-toggle="collapse" 
                      data-bs-target="#collapse_${idCompetencia}_${index}" 
                      aria-expanded="${index === 0 ? 'true' : 'false'}" 
                      aria-controls="collapse_${idCompetencia}_${index}">
                ${cat.titulo}
              </button>
            </h2>
            <div id="collapse_${idCompetencia}_${index}" 
                 class="accordion-collapse collapse ${index === 0 ? 'show' : ''}" 
                 aria-labelledby="heading_${idCompetencia}_${index}" 
                 data-bs-parent="#${accordionId}">
              <div class="accordion-body">
                ${cat.conteudo || "Sem descrição"}
              </div>
            </div>
          </div>
        `).join('')}
      </div>

      
    `;

        container.appendChild(div);
      });

      renderPagination();
      renderAvaliados();
    }

    //Distribuí os avaliados em formato de tabela 
    function renderAvaliados() {
      const tabela = document.getElementById("avaliados-tabela");
      tabela.innerHTML = '';

      const idCompetenciaAtual = competencias[currentPage]?.id; // pega id da competência atual

      avaliados.forEach(avaliado => {
        const row = tabela.insertRow();
        row.dataset.id = avaliado.cpf;
        row.id = `avaliado-${avaliado.cpf}`;

        // Recupera resposta já salva (se houver)
        const respostaSelecionada = respostas[idCompetenciaAtual]?.[avaliado.cpf] || "";

        row.innerHTML = `
      <td>${avaliado.nome}</td>
      <td><input type="radio" name="resposta-${avaliado.cpf}" value="4" ${respostaSelecionada === "4" ? "checked" : ""}></td>
      <td><input type="radio" name="resposta-${avaliado.cpf}" value="3" ${respostaSelecionada === "3" ? "checked" : ""}></td>
      <td><input type="radio" name="resposta-${avaliado.cpf}" value="2" ${respostaSelecionada === "2" ? "checked" : ""}></td>
      <td><input type="radio" name="resposta-${avaliado.cpf}" value="1" ${respostaSelecionada === "1" ? "checked" : ""}></td>
    `;

        // Adiciona evento para salvar escolha
        row.querySelectorAll('input[type="radio"]').forEach(radio => {
          radio.addEventListener('change', () => {
            salvarResposta(idCompetenciaAtual, avaliado.cpf, radio.value);
          });
        });
      });
    }


    //Função que renderiza as competencias em paginação, evitando a necessidade de se criar uma página para cada competencia
    function renderPagination() {
      const totalPages = Math.ceil(competencias.length / itemsPerPage);
      const paginationContainer = document.getElementById('pagination-container');
      paginationContainer.innerHTML = '';
      for (let i = 0; i < totalPages; i++) {
        const pageNumber = document.createElement('span');
        pageNumber.className = `page-number ${i === currentPage ? 'active' : ''}`;
        pageNumber.innerText = i + 1;
        pageNumber.addEventListener('click', () => {
          currentPage = i;
          renderCompetencias();
        });
        paginationContainer.appendChild(pageNumber);
      }
    }

    function salvarResposta(idCompetencia, cpfAvaliador, valor) {
      respostas = JSON.parse(localStorage.getItem('respostas_avaliacao')) || {};

      if (!respostas[idCompetencia]) {
        respostas[idCompetencia] = {};
      }

      respostas[idCompetencia][cpfAvaliador] = valor;
      localStorage.setItem('respostas_avaliacao', JSON.stringify(respostas));
    }


    //Ajustada a função de botão para próxima página para que ela passe para a próxima competencia caso não seja a ultima página. Caso seja, chama o modal de finalização.
    document.getElementById('btn-proximo').addEventListener('click', async () => {
      const totalPages = Math.ceil(competencias.length / itemsPerPage);

      if (currentPage < totalPages - 1) {
        // Apenas avança para a próxima página sem enviar resposta
        currentPage++;
        renderCompetencias();
      } else {
        // Está na última página, verifica se todas as respostas foram preenchidas antes de enviar
        if (verificaSeTodasRespondidas()) {
          $('#finalizarModal').modal('show');
        } else {
          const faltando = listarFaltantes();

          if (faltando.length === 0) {
            console.log("✅ Todas as respostas foram preenchidas!");
          } else {
            console.log("⚠️ Faltam respostas para:");
            faltando.forEach(f => {
              console.log(`- ${f.nomeAvaliador} em "${f.nomeCompetencia}"`);
            });
          }

        }
      }
    });

    //---------------------------------------------Requisição para API enviar ao banco de dados---------------------------------------------------------------------
    // Implementacao para responder as competencias e enviar para o banco
    document.getElementById('confirmar-finalizar').addEventListener('click', async () => {
      const idAvaliacao = localStorage.getItem('idAvaliacao');
      const dataResposta = new Date().toISOString().slice(0, 19).replace('T', ' ');

      respostas = JSON.parse(localStorage.getItem('respostas_avaliacao')) || {};

      // Converte o objeto de respostas em um array formatado
      const competencias = Object.keys(respostas).flatMap(idCompetencia => {
        const objCompetencia = respostas[idCompetencia]; 

        return Object.keys(objCompetencia).map(cpf => ({
          idCompetencia: parseInt(idCompetencia),
          cpf, 
          valor: objCompetencia[cpf] || '', 
          observacoes: '',
          dataResposta
        }));
      });


      // Monta o corpo da requisição
      const payload = {
        idAvaliacao,
        competencias
      };

      try {
        const token = sessionStorage.getItem('token');

        const response = await fetch('http://localhost:3000/salvarRespostaGestor', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)

        });

        if (response.ok) {
          console.log('Respostas enviadas com sucesso!');
          localStorage.removeItem('respostas_avaliacao');
          localStorage.removeItem('idAvaliacao');
          sessionStorage.removeItem('token');
          window.location.href = "thanks.html";
        } else {
          const errorData = await response.json();
          alert('Erro ao enviar respostas: ' + (errorData.message || 'Erro desconhecido'));
        }
      } catch (err) {
        console.error('Erro na requisição:', err);
        alert('Falha na conexão com o servidor.');
      }

    });

    function verificaSeTodasRespondidas() {
      return competencias.every(c =>
        avaliados.every(av =>
          respostas[c.id]?.[av.cpf] && respostas[c.id][av.cpf] !== ""
        )
      );
    }

    function listarFaltantes() {
      const faltantes = [];

      competencias.forEach(c => {
        avaliados.forEach(av => {
          const valor = respostas[c.id]?.[av.cpf];

          if (!valor || valor === "") {
            faltantes.push({
              idCompetencia: c.id,
              nomeCompetencia: c.nome,
              cpfAvaliador: av.cpf,
              nomeAvaliador: av.nome
            });
          }
        });
      });

      return faltantes;
    }





    //Botão voltar configurado para navegar entre as páginas. Caso a página seja igual a 0 ele volta para a tela de orientações
    document.querySelector('.btn-voltar').addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderCompetencias();
      } else {
        window.location.href = "instructions.html";
      }
    });

    const idAvaliacao = localStorage.getItem('idAvaliacao');
    loadCompetencias(idAvaliacao);
  </script>
</body>

</html>
