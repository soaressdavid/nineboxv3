<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orientações</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<link rel="stylesheet" href="../../../assets/styles/navbar.css">
  <style>
    .container {
      width: 50%;
      max-width: 800px;
      padding: 20px;
    }

    .container-btn {
      display: flex;
      justify-content: center;
      gap: 80%;
    }

    .content-box {
      display: flex;
      height: auto;
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border: 1px solid #000000;
      margin-bottom: 10%;
    }

    .btn-comecar {
      background-color: #1a237e;
      color: white;
      text-decoration: none;
      padding: 12px 36px;
      border-radius: 8px;
      font-size: 16px;
    }

    .btn-comecar:hover {
      background-color: white;
      color: #1a237e;
      border: 1px solid #1a237e;
    }
  </style>
</head>

<body>


  <div class="container">
    <div class="content-box" style="max-width: 1000px;">

    </div>

    <div class="container-btn text-center mt-1">
      <button type="button" class="btn btn-comecar" id="responderCompetencias">
        Começar
      </button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <!-- Script do navbar -->
    <script src="../../../scripts/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"></script>

    <script>

      window.nomePagina = "Orientações";

      document.addEventListener('DOMContentLoaded', function () {
        const token = sessionStorage.getItem('token');
        const idAvaliacao = localStorage.getItem('idAvaliacao');

        if (!token) {
          alert('Sessão expirada ou não autenticada. Faça login novamente.');
          window.location.href = 'index.html';
          return;
        } else if (!idAvaliacao) {
          alert('Erro, Avaliação não encontrada.');
          window.location = '.index.html';
          return;
        }

        // Buscar descrição com base no idAvaliacao
        $.ajax({
          url: 'http://localhost:3000/descricaoPoridAvaliacao',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ idAvaliacao: idAvaliacao }),
          success: function (response) {
            const descricaoElement = document.createElement('p');
            descricaoElement.innerHTML = response.descricao.replace(/\n/g, '<br>');
            document.querySelector('.content-box').appendChild(descricaoElement);
          },
          error: function (xhr) {
            console.error('Erro ao buscar descrição:', xhr.responseJSON?.message || xhr.statusText);
          }
        });



        // Confirmação de início
        document.getElementById('responderCompetencias').addEventListener('click', function () {
          window.location.href = "form.html";
        });

      });
    </script>
</body>

</html>
