<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../../../../assets/styles/nova_avaliacao.css">
  <!-- Estilo do navbar -->
  <link rel="stylesheet" href="../../../../assets/styles/navbar.css">
  <title>Agradecimentos e Finalização</title>
</head>

<body>
  <!-- navbar é gerado via javascript -->

  <div class="container mt-5">
    <div class="card shadow-lg mx-auto" style="width: 70%;">
      <div class="card-body">
        <h5 class="text-center mb-4" id="titulo-card">Agradecimentos e Finalização</h5>
        <div class="mb-3">
          <label for="textoFinal" class="form-label">Texto final:</label>
          <textarea class="form-control" id="textoFinal" rows="4" oninput="salvarTextoFinalNolocalStorage()"
            placeholder="Escreva uma mensagem ao avaliado sobre as considerações finais da avaliação..."></textarea>
        </div>
        <div class="d-flex justify-content-between mt-4">
          <a href="step3.html">
            <button class="btn btn-outline-primary btn-voltar" id="return">Voltar</button>
          </a>
          <button class="btn btn-primary btn-finalizar" type="button" data-bs-toggle="modal"
            data-bs-target="#finalizarModal">Finalizar</button>

          <!--Modal de confirmação-->
          <div class="modal" id="finalizarModal" tabindex="-1" aria-labelledby="finalizarModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="titulo-card">Deseja finalizar a avaliação?</h5>
                </div>
                <div class="modal-body">
                  Tem certeza que deseja criar esta avaliação?
                </div>
                <div class="modal-footer d-flex justify-content-between">
                  <button type="button" class="btn btn-outline-custom btn-voltar" data-bs-dismiss="modal">Não</button>
                  <button type="button" class="btn btn-primary btn btn-primary btn-proximo" id="create"
                    data-bs-dismiss="modal">Sim</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Modal de erro -->
        <div class="modal" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-body text-center">
                <h5 class="modal-title mb-4" id="titulo-card">Não é possível criar a avaliaçao faltando informações. Por
                  favor, preencha
                  todos os campos para salvar a avaliação!</h5>
                <button type="button" class="btn btn-outline-custom btn-voltar" data-bs-dismiss="modal"
                  id="errorClose">Fechar</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Modal de sucesso -->
        <div class="modal fade" id="modalSucesso" tabindex="-1" aria-labelledby="modalSucessoLabel">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-body text-center">
                <h5 class="modal-tittle mb-4" id="titulo-card">Avaliação criada e enviada com sucesso!</h5>
                <button type="button" class="btn btn-outline-custom btn-voltar" data-bs-dismiss="modal"
                  id="successClose">Fechar</button>
              </div>
            </div>
          </div>
        </div>


        <!-- Navbar e script do modal -->
        <script src="../../../../scripts/navbar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          crossorigin="anonymous"></script>

        <script>

          window.nomePagina = "Criar nova avaliação gestor";

          // Função para salvar o texto final no localStorage
          function salvarTextoFinalNolocalStorage() {
            const textoFinal = document.getElementById('textoFinal').value;
            const formularioGestor = JSON.parse(localStorage.getItem("formularioGestor")) || {};
            formularioGestor.metadados.textoFinal = textoFinal;
            localStorage.setItem("formularioGestor", JSON.stringify(formularioGestor));
          }

          // Ao carregar a página, recuperar o textoFinal do localStorage
          window.addEventListener('DOMContentLoaded', () => {
            const formularioGestor = JSON.parse(localStorage.getItem("formularioGestor")) || {};
            if (formularioGestor.metadados.textoFinal) {
              document.getElementById('textoFinal').value = formularioGestor.metadados.textoFinal;
            }
          });

          document.getElementById('create').addEventListener('click', async () => {
            const formularioGestor = JSON.parse(localStorage.getItem("formularioGestor")) || {};

            // Extrai os dados essenciais dos avaliados e competências
            const avaliados = (formularioGestor.avaliados || []).map(avaliado => ({
              cpf: avaliado.cpf
            }));

            const competencias = (formularioGestor.competencias || []).map(comp => ({
              id: comp.id
            }));

            const avaliacaoCompleta = {
              nomeAvaliacao: formularioGestor.metadados?.nomeAvaliacao || '',
              cpf_gestor: formularioGestor.metadados?.cpfGestorSelecionado || '',
              empresa: formularioGestor.metadados?.empresa || '',
              dataInicio: formularioGestor.metadados?.dataInicio || '',
              dataFim: formularioGestor.metadados?.dataFim || '',
              descricao: formularioGestor.metadados?.descricao || '',
              textoFinal: formularioGestor.metadados?.textoFinal || '',
              avaliados,
              competencias
            };

            // Validação básica
            if (!avaliacaoCompleta.nomeAvaliacao || !avaliacaoCompleta.empresa ||
              !avaliacaoCompleta.dataInicio || !avaliacaoCompleta.dataFim ||
              avaliacaoCompleta.avaliados.length === 0 ||
              avaliacaoCompleta.competencias.length === 0) {
              new bootstrap.Modal(document.getElementById('errorModal')).show();
              return;
            }

            try {
              const response = await fetch('http://localhost:3000/adicionarAvaliacaoGestor', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(avaliacaoCompleta)
              });

              if (!response.ok) throw new Error('Erro no servidor');

              new bootstrap.Modal(document.getElementById('modalSucesso')).show();
              localStorage.removeItem("formularioGestor");

              setTimeout(() => {
                window.location = "../../../dashboard/menu.html";
              }, 2000);

            } catch (error) {
              console.error('Erro:', error);
              alert('Erro ao salvar avaliação: ' + error.message);
            }
          });
        </script>

</body>

</html>
