<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"  
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="../../../assets/styles/evaluations.css">
  <!-- Estilo do navbar -->
  <link rel="stylesheet" href="../../../assets/styles/navbar.css">
  <title>Criar Nova Avaliação</title>
</head>

<body>
  <!--navbar tem seu código no documento navbar.html e scripts/navbar.js para facilitar a manuntenção-->


  <div class="container mt-5">
    <!--card, se repete por todo formulário de criar nova avaliação, classe .card-->
    <div class="card shadow-lg mx-auto" style="width: 60%;">
      <div class="card-body ps-5 pe-5">
        <h5 class="text-center mb-4" id="titulo-card">Selecione o tipo de avaliação que deseja criar:</h5>


        <div class="tipoAvaliacao d-flex justify-content-between  mt-5 mb-5">
          <div id="autoavaliacao"><img src="../../../assets/images/icons/self-evaluation.svg" alt="icone autoavaliacao">
          </div>
          <div id="avaliacaoGestor"><img src="../../../assets/images/icons/manager-evaluation.svg" alt="icone avaliacao"></div>
        </div>



        <div class="button-group d-flex justify-content-between">
          <button class="btn btn-outline-primary btn-voltar" id="btnVoltar">Voltar</button>
          <button class="btn btn-primary btn-proximo" id="btnProximo">Próximo</button>
        </div>
      </div>
    </div>
  </div>



  <!-- Navbar e script do modal -->
  <script src="../../../scripts/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>


  <script>

    window.nomePagina = "Criar nova avaliação";

    //Função para capturar o clique do usuário ao escolher o tipo de avaliação

    const btnAutoavaliacao = document.getElementById("autoavaliacao");
    const btnAvaliacaoGestor = document.getElementById("avaliacaoGestor");
    const imgAvaliacao = btnAutoavaliacao.querySelector("img");
    const imgAvaliacaoGestor = btnAvaliacaoGestor.querySelector("img");

    let avaliacaoSelecionada = "";

    //Função de listener que aguarda o click do usuário em um dos tipos de avaliação

    btnAutoavaliacao.addEventListener("click", function (e) {
    
      avaliacaoSelecionada = "autoavaliacao";      
      selecionaAvaliacao()
    });

    btnAvaliacaoGestor.addEventListener("click", function (e) {
      
      avaliacaoSelecionada = "avaliacaoGestor";
      selecionaAvaliacao()
    });

    //Essa função troca a imagem do tipo de avaliação selecionada conforme o valor da variável avaliacaoSelecionada

    function selecionaAvaliacao() {
      if (avaliacaoSelecionada === "autoavaliacao") {
        imgAvaliacao.src = "../../../assets/images/icons/self-evaluation-selected.svg";
        imgAvaliacao.alt = "icone da autoavaliacao selecionado";

        imgAvaliacaoGestor.src = "../../../assets/images/icons/manager-evaluation.svg";
        imgAvaliacaoGestor.alt = "icone da avaliação do gestor";
      } else if (avaliacaoSelecionada === "avaliacaoGestor") {
        imgAvaliacao.src = "../../../assets/images/icons/self-evaluation.svg";
        imgAvaliacao.alt = "icone da autoavaliacao";

        imgAvaliacaoGestor.src = "../../../assets/images/icons/manager-evaluation-selected.svg";
        imgAvaliacaoGestor.alt = "icone da avaliação do gestor selecionado";
      }

    }


    //Função para avançar para a próxima página de acordo com o que o usuário clicou
    const btnProximo = document.getElementById("btnProximo");

    btnProximo.addEventListener("click", function (e) {
      if (avaliacaoSelecionada == "autoavaliacao") {
        window.location.href = "self-evaluation/step1.html"
      }else if (avaliacaoSelecionada == "avaliacaoGestor") {        
        window.location.href = "manager-evaluation/step1.html"
      } else {
        alert("Selecione um tipo de avaliação");
      }

    });


    //Função para voltar para o menu ao apertar o botão voltar
    const btnVoltar = document.getElementById("btnVoltar");

    btnVoltar.addEventListener("click", function (e) {
      window.location = "../../dashboard/menu.html";
    })

  </script>



</html>
