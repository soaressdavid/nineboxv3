<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minhas Avaliações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
      <link rel="stylesheet" href="../../../assets/styles/navbar.css">
    <style>
        /* Reset e estilos básicos */
        * {
            box-sizing: border-box;
        }

        /* Navbar gerado separadamente pelos arquivos scripts/navbar.js e navbar.css */


        body {
            background-color: #f4f7fc;
        }


        .card {
            border-radius: 12px;
        }

        .pesquisa {
            width: 100%;
            margin-bottom: 1rem;
            border: 1px solid #ced4da;
            border-radius: 5px;
            padding: 0.375rem 0.75rem;
            box-sizing: border-box;
        }

        .table thead th {
            background-color: #273696;
            color: white;
            font-weight: 600;
            text-align: center;
        }

        .table tbody td {
            vertical-align: middle;
            text-align: center;
        }

        .btn-voltar {
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            border-color: #1a237e;
            color: #1a237e;
        }

        .btn-proximo {
            background-color: #1a237e !important;
            color: white !important;
            text-decoration: none !important;
            padding: 12px 30px !important;
            border-radius: 8px !important;
            font-size: 16px !important;
        }

        .btn-voltar:hover {
            background-color: #1a237e;
            color: white;
            transition: 0.2s;
        }

        .btn-proximo:hover {
            background-color: white !important;
            color: #1a237e !important;
            transition: 0.2s;
        }

        .footer-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .card-body {
            padding: 1.5rem 2rem;
        }

        .linha-avaliacao:hover {
            background-color: #e0e0f8;
            cursor: pointer;
        }

        .table-primary {
            background-color: #b4c6ff !important;
        }

        .table td,
        .table th {
            text-align: center;
        }

        .table-primary th {
            font-weight: normal !important;
            color: white !important;
            background-color: #00008B !important;
        }
    </style>
</head>

<body>


    <!--navbar tem seu código separado no documento navbar.html e scripts/navbar.js para facilitar a manuntenção. O código se repete em todas as páginas de criar nova avaliacao-->


    <div class="container d-flex justify-content-center align-items-center">
        <div class="card mb-5" style="width: 50rem; height: auto;">
            <div class="card-body">

                <h5 class="d-flex justify-content-center mb-3">Pesquisar avaliações:</h5>
                <input type="text" class="pesquisa" placeholder="Pesquisar pelo nome:"
                    aria-label="Pesquisar avaliações" />

                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Avaliação</th>
                                <th>Empresa</th>
                                <th>Data Início</th>
                                <th>Data Fim</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Conteúdo será preenchido via JavaScript -->
                        </tbody>
                    </table>
                </div>

                <div class="footer-buttons">
                    <a href="../dashboard/menu.html"><button class="btn btn-outline-primary btn-voltar">Voltar</button></a>
                    <button class="btn btn-primary btn-proximo" id="saveUsuariosButton"
                        onclick="irParaDashboard()">Próximo</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        //Identificação da página para o navbar
        window.nomePagina = "Minhas Avaliações";


        document.addEventListener('DOMContentLoaded', function () {
            const pesquisaInput = document.querySelector('.pesquisa');
            const tbody = document.querySelector('tbody');
            let avaliacoes = [];

            // Carregar dados do backend
            fetch('http://localhost:3000/avaliacoes')
                .then(res => res.json())
                .then(data => {
                    avaliacoes = data;
                    renderizarTabela(avaliacoes);
                })
                .catch(err => console.error('Erro ao buscar dados:', err));

            // Renderiza a tabela com os dados
            function renderizarTabela(lista) {
                tbody.innerHTML = '';

                lista.forEach(avaliacao => {
                    const tr = document.createElement('tr');
                    tr.classList.add('linha-avaliacao');

                    tr.dataset.id = avaliacao.id;
                    tr.id = `${avaliacao.id}`;

                    tr.innerHTML = `
          <td style="text-align:left; padding-left: 15px;">${avaliacao.nomeAvaliacao}</td>
          <td>${avaliacao.empresa}</td>
          <td>${new Date(avaliacao.dataInicio).toLocaleDateString('pt-BR')}</td>
          <td>${new Date(avaliacao.dataFim).toLocaleDateString('pt-BR')}</td>
          <td>${avaliacao.status}</td>
        `;

                    tbody.appendChild(tr);
                });

                ativarSelecao();
            }

            // Filtro de busca
            pesquisaInput.addEventListener('input', function () {
                const termo = this.value.toLowerCase();
                const filtradas = avaliacoes.filter(a =>
                    a.nomeAvaliacao.toLowerCase().includes(termo)
                );
                renderizarTabela(filtradas);
            });

            // Clique para selecionar
            function ativarSelecao() {
                const linhas = document.querySelectorAll('.linha-avaliacao');
                linhas.forEach(linha => {
                    linha.addEventListener('click', () => {

                        if (linhas) {

                            linhas.forEach(l => l.classList.remove('table-primary'));
                            linha.classList.add('table-primary');

                            // Salvar o ID da inner row no localStorage
                            localStorage.setItem("avaliacaoSelecionada", linha.dataset.id);

                            console.log("ID salvo no localStorage:", linha.dataset.id);
                        }
                    });
                });
            }
        });

        // Botão "Próximo" usa a avaliação selecionada
        function irParaDashboard() {
            const selecionada = localStorage.getItem('avaliacaoSelecionada');
            if (!selecionada) {
                alert('Por favor, selecione uma avaliação antes de continuar.');
                return;
            }

            // Redirecionar para a próxima página (dashboard.html)
            window.location.href = 'dashboard.html';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="../../../scripts/navbar.js"></script>
</body>

</html>
