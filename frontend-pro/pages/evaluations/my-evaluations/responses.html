<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Avaliacoes</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<!-- Estilo do navbar -->
  <link rel="stylesheet" href="../../../assets/styles/navbar.css">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background-color: #f4f7fc;
    }

    .content-box {
      display: flex;
      flex-direction: column;
      justify-content: stretch;
      justify-items: center;
    }

    .container_avaliacao {
      border: 1px solid #ccc;
      background-color: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 1rem;
    }

    #txt_colored {
      color: rgb(3, 92, 194);
      font-size: 1.3rem;
    }

    .radio-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;

    }

    .radio-group-title {
      flex: 1;
      text-align: left;
    }

    .radio-group-input {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      border-left: 1px solid #ccc;
      gap: 5px;
      position: relative;
    }

    .radio-group-input .input-with-border {
      display: flex;
      align-items: center;

      /* Linha vertical */
      padding-left: 10px;
      /* Espaçamento entre a linha e o input */
    }

    .radio-group-input label {
      display: flex;
      align-items: center;
      margin: 0;
    }

    .radio-group-input input[type="radio"] {
      margin-right: 5px;
      /* Espaço entre o número e o input */
    }

    .radio-group-input .input-with-border:hover {
      background: #f5f6ff;
      border-radius: 6px;
    }

    .observacoes-div textarea {
      width: 100%;
      height: 100px;
      margin-top: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 0.5rem;
    }

    .container-btn {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    .btn-voltar {
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      background-color: white;
      border-color: #1a237e;
      color: #1a237e;
    }

    .btn-voltar:hover {
      background-color: #1a237e;
      color: white;
    }

    .btn-proximo {
      background-color: #1a237e;
      color: white;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
    }

    .btn-secondary {
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      border-color: #1a237e;
      color: #1a237e;
      background-color: white;
    }

    .btn-secondary:hover {
      background-color: #1a237e;
      color: white;
    }

    .btn-primary {
      background-color: #1a237e;
      color: white;
      text-decoration: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
    }

    .page-number {
      margin: 0 5px;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .page-number.active {
      font-weight: bold;
      color: #007bff;
    }



    .observacoes-div {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-top: 1rem;
      padding: 0.5rem;
      border: none;
    }

    .observacoes-div textarea {
      width: 100%;
      max-width: 500px;
      height: 100px;
      border: 1px solid #ccc;
      border-color: none;
      padding: 0.5rem;
      box-sizing: border-box;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .competencia-titulo {
      color: #1a237e;
      text-align: center;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>

  <!--Container que mostra a competencia selecionada-->
  <div class="container">
    <p id="txt_colored" class="text-center mb-4"></p>
    <div id="competencias-container" class="content-box">
      <!--Aqui fica o título da competencia, gerado pelo javascript renderCompetencias()-->
    </div>

    <div class="container-btn mb-5 align-items-center">
      <a href="../minhasAvaliacoes/dashboardAvaliado.html" class="btn btn-voltar" id="btn-voltar">Voltar</a>
      <div class="pagination-container" id="pagination-container"></div>
      <button class="btn btn-proximo" id="btn-proximo">Próximo</button>
    </div>
  </div>

  <!-- Modal de Finalização -->
  <div class="modal" tabindex="-1" id="finalizarModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Finalizar Avaliação</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <p>Você está prestes a finalizar sua avaliação. Deseja continuar?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="confirmar-finalizar">Sim, Finalizar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Navbar e script do modal -->
  <script src="../../../scripts/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>


  <script>

    //Identificação da página para o navbar
    window.nomePagina = "Minhas Avaliações - Respostas";

    //Variáveis globais
    //Armazena as competencias consultadas via API
    let competencias = [];
    //Cria o objeto respostas_avaliacao no local storage
    const localStorageKey = 'respostas_avaliacao';
    const itemsPerPage = 1;
    //Armazena o número da página e associa a competencia
    let currentPage = 0;
    //Essa variável é diferente da const respostas presente no renderCompetencia e salvar no local storage
    let respostas = JSON.parse(localStorage.getItem(localStorageKey)) || {};

    document.addEventListener("DOMContentLoaded", (event) => { 
      renderCompetencias()
     })


    //Aqui é a parte que carrega as competencias via API no banco
    async function loadCompetencias(idAvaliacao) {
      try {
        const response = await fetch('http://localhost:3000/competenciaPoridAvaliacao', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idAvaliacao })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Erro ${response.status}: ${errorText}`);
        }

        //Se der certo, ele chama a função renderCompetencias
        const data = await response.json();
        if (data.competencias && Array.isArray(data.competencias)) {
          competencias = data.competencias;
          renderCompetencias();
        } else {
          console.error('Competências não encontradas ou inválidas.');
        }
      } catch (error) {
        console.error('Erro ao carregar competências:', error);
      }
    }

    //---------------------------------------------A função renderCompetencias recebeu os seguintes ajustes:----------------------------------------------------------
    //Armazena o idCompetencia em uma const para associar a resposta ao id da competencia
    //Associa cada tópico da competencia (ideal, bom, mediano e a_melhoar) com os seus respectivos valores, permitindo que o usuário selecione apenas um valor
    //Chama a função saveRespostas e saveObservação ao passar de página (evento onchange) e aproveita para armazenar o valor do idCompetencia com o valor da resposta do usuário no local storage
    function renderCompetencias() {
      const container = document.getElementById('competencias-container');
      container.innerHTML = '';

      const startIndex = currentPage * itemsPerPage;
      const endIndex = Math.min(startIndex + itemsPerPage, competencias.length);
      const currentCompetencias = competencias.slice(startIndex, endIndex);

      currentCompetencias.forEach((competencia) => {
        const idCompetencia = competencia.id;
        const respostas = JSON.parse(localStorage.getItem('respostas_avaliacao')) || {};
        const observacao = respostas[idCompetencia]?.observacao || "";

        const tituloDiv = document.createElement('div');
        tituloDiv.className = 'competencia-titulo';
        tituloDiv.innerHTML = `<h2 style="text-align: center;  margin-bottom: 1rem; color: #7A51cc; font-weight: 700">${competencia.nome}</h2>`;
        container.appendChild(tituloDiv);

        const div = document.createElement('div');
        div.className = 'container_avaliacao';

        const radioChecked = (valor) => respostas[idCompetencia]?.valor == valor ? 'checked' : '';

        const categorias = [
          { titulo: competencia.ideal, valores: [4.9, 4.5, 4.1] },
          { titulo: competencia.bom, valores: [3.9, 3.5, 3.1] },
          { titulo: competencia.mediano, valores: [2.9, 2.5, 2.1] },
          { titulo: competencia.a_melhorar, valores: [1.9, 1.5, 1.1] }
        ];

        div.innerHTML = `
      <div style="display: flex; margin-top:10px; font-size: 18px; text-align: center; padding:10px; align-items: center; justify-content: center; margin-bottom: 1rem;">
        <p><strong>${competencia.descricao}</strong></p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%;">
        ${categorias.map(({ titulo, valores }, index) => `
          <div class="radio-group">
            <div class="radio-group-title">${titulo}</div>
            <div class="radio-group-input">
              ${valores.map(valor => `
                <div class="input-with-border">
                  <label style="margin: 0; ">
                    <input type="radio" name="competencia_${idCompetencia} " ${radioChecked(valor)} onclick="return false;" style="cursor: default;">
${valor}
                  </label>
                </div>
              `).join('')}
            </div>
          </div>          
          ${index !== categorias.length - 1 ? '<div style="border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); width: 100%; margin-top: 1rem;"></div>' : ''}
        `).join('')}
      </div>
      <div class="container-observacoes ">
        <div class="observacoes-div ">
          <textarea class="text-center p-auto " 
              id="observacao_${idCompetencia}" placeholder="Observações.."  readonly style="cursor: default;" ">${observacao}</textarea>
        </div>
      </div>             
    `;

        container.appendChild(div);
      });

      renderPagination();
    }

    //Função que renderiza as competencias em paginação, evitando a necessidade de se criar uma página para cada competencia
    function renderPagination() {
      const totalPages = Math.ceil(competencias.length / itemsPerPage);
      const paginationContainer = document.getElementById('pagination-container');
      paginationContainer.innerHTML = '';
      for (let i = 0; i < totalPages; i++) {
        const pageNumber = document.createElement('span');
        pageNumber.className = `page-number ${i === currentPage ? 'active' : ''}`;
        pageNumber.innerText = i + 1;
        pageNumber.addEventListener('click', () => {
          currentPage = i;
          renderCompetencias();
        });
        paginationContainer.appendChild(pageNumber);
      }
      verificaUltimaPagina(currentPage, totalPages);
    }

    //Criei essa função para esconder o botão próximo na ultima competência da avaliação.
    function verificaUltimaPagina(x, y) {
      paginaAtual = x + 1;
      paginasTotais = y;
      if (paginaAtual == paginasTotais) {
        $('#btn-proximo').css('visibility', 'hidden');
      } else {
        $('#btn-proximo').css('visibility', 'visible');
      }
    }

    //Essa função verifica se a pagina atual é a ultima, caso não seja incrementa 1 na variável global currentPage
    document.getElementById('btn-proximo').addEventListener('click', async () => {
      const totalPages = Math.ceil(competencias.length / itemsPerPage);

      if (currentPage < totalPages - 1) {
        // Apenas avança para a próxima página sem enviar resposta
        currentPage++;
        renderCompetencias();
      }
    });


    //Botão voltar configurado para navegar entre as páginas. Caso a página seja igual a 0 ele volta para a tela de orientações
    document.querySelector('.btn-voltar').addEventListener('click', () => {
      if (currentPage > 0) {
        currentPage--;
        renderCompetencias();
      } else {
        localStorage.removeItem('respostas_avaliacao');
        window.location.href = "responses.html";
      }
    });

    const idAvaliacao = localStorage.getItem('avaliacaoSelecionada');
    loadCompetencias(idAvaliacao);
  </script>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
