<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Expedição</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />
  <!--estilo do navbar gerado pelo js -->
  <link rel="stylesheet" href="../../../assets/styles/navbar.css">

  <style>
    /* Reset e estilos básicos */
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #f4f7fc;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 15px;
      padding: 25px 40px 35px 40px;
      background: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      font-size: 14px;
      color: #222;
      margin-top: 45px;
    }

    .card h2 {
      color: #7a51cc;
      text-align: center;
      margin-bottom: 30px;
      /* aumentei aqui de 10px para 30px */
      font-weight: 700;
    }

    .content {
      display: flex;
      gap: 30px;
    }

    /* Painel direito */

    .tituloMedia {
      display: grid;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #7A51cc;
    }

    #contadorRespondentes {
      font-weight: 700;
      font-size: 24px;
      color: #ffffff;
      background-color: #1a237e;
    }

    .painel-direita-direita {
      align-content: space-between;
    }

    .painel-direita-cima {
      margin-bottom: 1rem;
    }



    .infoContainer {
      display: grid;
      align-items: center;
      border: solid 1px #ccc;
    }

    .infoContainer>label {
      margin: auto;
      color: #7A51cc;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }

    .infoContainer>div {
      background-color: #1a237e;
      margin-left: 10%;
      margin-right: 10%;
      color: white;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-top: 15px
    }

    .table-primary {
      background-color: #b4c6ff !important;

    }

    .table-primary th {
      font-weight: normal !important;
      color: white !important;
      background-color: #00008B !important;
    }

    th,
    td {
      border: 1px solid #1a237e;
      padding: 4px 6px;
      text-align: left;
    }

    th {
      background-color: #1a237e;
      color: #fff;
    }

    th:nth-child(1),
    td:nth-child(1) {
      width: 45%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th:nth-child(2),
    td:nth-child(2) {
      width: 35%;
      text-align: center;
    }

    .btn-voltar {
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      color: #1a237e;
    }

    .btn-detalhes {
      background-color: #1a237e !important;
      color: white !important;
      text-decoration: none !important;
      padding: 12px 30px !important;
      border-radius: 8px !important;
      font-size: 16px !important;
    }

    .btn-voltar:hover {
      background-color: #1a237e;
      color: white;
      transition: 0.2s;
    }

    .btn-detalhes:hover {
      background-color: white !important;
      color: #1a237e !important;
      border-color: #1a237e !important;
      transition: 0.2s;
    }
  </style>

</head>

<body>


  <!-- navbar gerado pelo javascript -->

  <div class="container card mb-5 justify-content-center">

    <h2 class="mb-5 mt-2" id="nome-avaliacao"></h2>

    <div class="d-lg-flex d-grid gap-3">

      <div class="container d-flex mb-3">
        <img class="w-100" src="../../../assets/images/logo/ninebox.svg" alt="matriz ninebox">
      </div>

      <!-- Direita - gráfico + informações -->
      <div class="container">

        <div class="container">

          <div class="painel-direita-cima d-flex gap-2">

            <div class="border w-50">
              <label class="tituloMedia mb-3 mt-2">Responderam:</label>
              <div class="d-flex justify-content-center align-items-center w-50 m-auto mb-3" id="contadorRespondentes">
              </div>
            </div>

            <div class="infoContainer w-50">
              <label>Período Vigente da Avaliação</label>
              <div class="gap-1 d-md-flex d-block">
                <div id="inicio-avaliacao"></div><span>/</span>
                <div id="fim-avaliacao"></div>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2">


            <div class="border w-50"><canvas id="graficoRespondentes"></canvas></div>

            <div class="d-grid w-50 row-gap-3">

              <div class="infoContainer">
                <label>Empresa Avaliada</label>
                <div id="empresa-avaliacao"></div>
              </div>

              <div class="infoContainer">
                <label>Número de Avaliados</label>
                <div id="total-avaliados"></div>
              </div>

            </div>

          </div>

        </div>

        <table class="display-flex mt-5">
          <thead>
            <tr class="justify-content-center">
              <th>CPF</th>
              <th>Nome</th>
              <th>Respondeu</th>
            </tr>
          </thead>
          <tbody id="avaliados-tabela">
          </tbody>
        </table>
      </div>

    </div>

    <div class="button-group d-flex justify-content-between mt-5">
      <button class="btn btn-outline-primary btn-voltar">Voltar</button>
      <button class="btn btn-detalhes btn-proximo">Detalhes</button>
    </div>
  </div>
  <!-- Script para o gráfico e filtro -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Script do navbar -->
  <script src="../../../scripts/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <script>

    //Identificação da página para o navbar
    window.nomePagina = "Minhas Avaliações - Dashboard";


    let cpfsResponderam = [];
    let totalAvaliados;


    async function consultarAvaliacaoSelecionada() {
      const id = localStorage.getItem("avaliacaoSelecionada");

      if (!id) {
        console.warn("Nenhum ID encontrado no localStorage.");
        return;
      }

      try {
        const res = await fetch("http://localhost:3000/dashboardPoridAvaliacao", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ idAvaliacao: id })
        });

        const data = await res.json();

        if (data.informacoes) {
          preencherDashboard(data.informacoes);
          await consultarRespostas(); // espera os CPFs que responderam serem carregados
          preencherListaAvaliados(data.informacoes.avaliados); // agora com a info de respondeu
          totalAvaliados = data.informacoes.quantidadeAvaliados;

        } else {
          console.warn("Nenhum campo 'informacoes' encontrado na resposta.");
        }
      } catch (error) {
        console.error("Erro ao consultar a API:", error);
      }
    }


    async function consultarRespostas() {
      const id_avaliacao = localStorage.getItem("avaliacaoSelecionada");

      if (!id_avaliacao) {
        console.warn("Sem id_avaliacao no Local Storage.");
        return;
      }

      try {
        const res = await fetch(`http://localhost:3000/respostasAvaliadosGeral/${id_avaliacao}`);

        if (!res.ok) {
          throw new Error(`HTTP error! Status: ${res.status}`);
        }

        const data = await res.json();

        if (data.results) {
          cpfsResponderam = data.results.map(item => item.cpf_avaliado);
        } else {
          console.warn("Campo 'results' não encontrado.");
        }
      } catch (error) {
        console.error("Erro ao consultar respostas:", error);
      }
    }

    // Teste manual
    consultarAvaliacaoSelecionada()
    consultarRespostas();

    //Consultar as respostas da avaliação e retorna quantos responderam, possibilitando verificar a quantidade de avaliados que já responderam a avaliação;


    //Preenche o dash com as informações solicitadas na API
    function preencherDashboard(infoAvaliacao) {
      document.getElementById("nome-avaliacao").textContent = "Visão Geral: " + infoAvaliacao.nomeAvaliacao;
      document.getElementById("empresa-avaliacao").textContent = infoAvaliacao.empresa;
      document.getElementById("inicio-avaliacao").textContent = new
        Date(infoAvaliacao.dataInicio).toLocaleDateString("pt-BR");
      document.getElementById("fim-avaliacao").textContent = new Date(infoAvaliacao.dataFim).toLocaleDateString("pt-BR");
      document.getElementById("total-avaliados").textContent = infoAvaliacao.quantidadeAvaliados;
    }

    function preencherListaAvaliados(infoAvaliados) {
      const tabela = document.getElementById("avaliados-tabela");
      tabela.innerHTML = ""; // Limpa antes de preencher

      infoAvaliados.forEach(avaliado => {
        const row = tabela.insertRow();
        row.classList.add('linha-avaliado');
        row.dataset.id = avaliado.cpf;
        row.id = `${avaliado.cpf}`;

        const respondeu = cpfsResponderam.includes(avaliado.cpf) ? "Sim" : "Não";

        row.innerHTML = `
  <td>${avaliado.cpf}</td>
  <td>${avaliado.nome}</td>
  <td>${respondeu}</td>
  `;
      });

      selecionarListaAvaliados();
      atualizarDashboard();


    }

    function preencherRespostasListaAvaliados(respostasAvaliados) {
      const linhas = document.querySelectorAll('.linha-avaliado');
      linhas.forEach(linha => {

        if (row.dataset.id == respostasAvaliados) {
          row.innerHTML = `
  <td>Ok</td>
  `;
        }


      })
      selecionarListaAvaliados();
    }

    function selecionarListaAvaliados() {
      const linhas = document.querySelectorAll('.linha-avaliado');
      linhas.forEach(linha => {
        linha.addEventListener('click', () => {

          if (linhas) {

            linhas.forEach(l => l.classList.remove('table-primary'));
            linha.classList.add('table-primary');

            // Salvar o CPF da inner row no localStorage
            localStorage.setItem("avaliadoSelecionado", linha.dataset.id);
          }
        });
      });
    }

    //Essa função serve para verificar o número total de avaliados e gerar o gráfico de Pizza no dashboard.
    async function atualizarDashboard() {
      await consultarRespostas()
      const respondidos = cpfsResponderam.length;
      const naoRespondidos = totalAvaliados - respondidos;


      // Atualiza contador
      document.getElementById("contadorRespondentes").textContent =
        `${respondidos} / ${totalAvaliados}`;

      // Gera gráfico de pizza
      const ctx = document.getElementById("graficoRespondentes").getContext("2d");
      new Chart(ctx, {
        type: "pie",
        data: {
          datasets: [{
            data: [respondidos, naoRespondidos],
            backgroundColor: ["#9ecf3f", "#1a237e"],
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: "bottom"
            },
          }
        }
      });
    }

    document.querySelector('.btn-voltar').addEventListener('click', () => {
      localStorage.removeItem('avaliacaoSelecionada');
      localStorage.removeItem('cpf');
      localStorage.removeItem('avaliadoSelecionado');
      localStorage.removeItem('idAvaliacao');
      window.location.href = 'list.html';
    });

    document.querySelector('.btn-detalhes').addEventListener('click', () => {
      const detalhesAvaliado = localStorage.getItem('avaliadoSelecionado');
      if (detalhesAvaliado === null) {
        alert("Selecione um avaliado para consultar mais detalhes");
        return 0;
      } else {
        window.location.href = 'responses.html';
      }
    });

  </script>

</body>

</html>
